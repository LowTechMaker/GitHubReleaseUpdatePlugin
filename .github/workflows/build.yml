name: Auto CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: windows-latest
    env:
      NuGetPackageSourceCredentials_SceneGalleryGitHub: "Username=${{ github.actor }};Password=${{ secrets.GITHUB_TOKEN }}"

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "ga"

      - name: Build
        run: dotnet build SceneGallery.Plugin.GitHubReleaseUpdates.csproj -c Release

      - name: Test
        run: dotnet test SceneGallery.Plugin.GitHubReleaseUpdates.Tests/SceneGallery.Plugin.GitHubReleaseUpdates.Tests.csproj -c Release -p:DeployPluginToApp=false
