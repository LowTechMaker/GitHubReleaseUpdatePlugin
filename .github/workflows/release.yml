name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4

      - name: Checkout SceneGallery SDK
        uses: actions/checkout@v4
        with:
          repository: LowTechMaker/KoikatsuSceneGallery
          path: KoikatsuSceneGallery

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "ga"

      - name: Determine version tag
        id: version
        shell: pwsh
        run: |
          $tag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { "${{ github.ref_name }}" }
          $tag = $tag.Trim()
          $version = if ($tag.StartsWith("v", [StringComparison]::OrdinalIgnoreCase)) { $tag.Substring(1) } else { $tag }
          $semVerPattern = '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$'
          if ($version -notmatch $semVerPattern) {
            Write-Error "Invalid release tag '$tag': expected a SemVer value such as v1.2.3 or 1.2.3."
            exit 1
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build
        run: dotnet build SceneGallery.Plugin.GitHubReleaseUpdates.csproj -c Release -p:Version="${{ steps.version.outputs.version }}" -p:IncludeSourceRevisionInInformationalVersion=false -p:DeployPluginToApp=false -p:SceneGalleryAppDir="$env:GITHUB_WORKSPACE\KoikatsuSceneGallery"

      - name: Package release asset
        id: asset
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $source = "bin/Release/net10.0/SceneGallery.Plugin.GitHubReleaseUpdates.dll"
          $asset = "bin/Release/net10.0/SceneGallery.Plugin.GitHubReleaseUpdates-$version.dll"
          Copy-Item -LiteralPath $source -Destination $asset
          "path=$asset" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.asset.outputs.path }}
